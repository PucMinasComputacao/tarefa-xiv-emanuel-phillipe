<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GlobalAlbums - Cadastro de álbum</title>
  <link rel="stylesheet" href="assets/styles/index.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900&display=swap" rel="stylesheet">
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  >
</head>
<body>
  <header>
    <nav class="navbar navbar-expand-lg">
      <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">GlobalAlbums</a>
        <button class="navbar-toggler bg-light" type="button" data-bs-toggle="collapse" data-bs-target="#menuCadastro" aria-controls="menuCadastro" aria-expanded="false" aria-label="Alternar navegação">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="menuCadastro">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="index.html">Início</a></li>
          </ul>
        </div>
      </div>
    </nav>
  </header>

  <main class="container py-4 py-md-5">
    <section>
      <h1 class="section-title">Cadastrar álbum</h1>
      <form id="albumForm" class="form-box">
        <div id="formFeedback" class="alert alert-success" hidden></div>

        <div class="row g-3">
          <div class="col-12 col-md-6">
            <label class="form-label" for="title">Título</label>
            <input class="form-control" id="title" name="title" type="text" required>
          </div>
          <div class="col-12 col-md-6">
            <label class="form-label" for="singer">Cantor(a)</label>
            <input class="form-control" id="singer" name="singer" type="text" required>
          </div>
          <div class="col-12 col-md-4">
            <label class="form-label" for="year">Ano</label>
            <input class="form-control" id="year" name="year" type="number" min="1900" max="2100" required>
          </div>
          <div class="col-12 col-md-4">
            <label class="form-label" for="genre">Categoria</label>
            <input class="form-control" id="genre" name="genre" type="text" required>
          </div>
          <div class="col-12 col-md-4">
            <label class="form-label" for="price">Valor</label>
            <input class="form-control" id="price" name="price" type="text" placeholder="R$ 49,90" required>
          </div>
          <div class="col-12 col-md-6">
            <label class="form-label" for="country">País</label>
            <input class="form-control" id="country" name="country" type="text" required>
          </div>
          <div class="col-12 col-md-6">
            <label class="form-label" for="tracks">Quantidade de faixas</label>
            <input class="form-control" id="tracks" name="tracks" type="number" min="1" required>
          </div>
          <div class="col-12">
            <label class="form-label" for="coverImage">URL da imagem</label>
            <input class="form-control" id="coverImage" name="coverImage" type="url" required>
          </div>
          <div class="col-12">
            <label class="form-label" for="shortDescription">Descrição curta</label>
            <input class="form-control" id="shortDescription" name="shortDescription" type="text" maxlength="140" required>
          </div>
          <div class="col-12">
            <label class="form-label" for="description">Descrição completa</label>
            <textarea class="form-control" id="description" name="description" rows="4" required></textarea>
          </div>
          <div class="col-12">
            <label class="form-label" for="inspiration">Inspiração</label>
            <input class="form-control" id="inspiration" name="inspiration" type="text" required>
          </div>
          <div class="col-12 col-md-8">
            <label class="form-label" for="tags">Tags</label>
            <input class="form-control" id="tags" name="tags" type="text" placeholder="pop, dance, acústico">
          </div>
          <div class="col-12 col-md-4 d-flex align-items-end">
            <div class="form-check pb-2">
              <input class="form-check-input" id="featured" name="featured" type="checkbox">
              <label class="form-check-label" for="featured">Destacar no carrossel</label>
            </div>
          </div>
        </div>

        <div class="d-flex gap-2 mt-4">
          <button class="btn btn-ga" type="submit">Cadastrar</button>
          <a class="btn btn-outline-secondary" href="index.html">Cancelar</a>
        </div>
      </form>
    </section>
  </main>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"
  ></script>
  <script src="cadastro_album.js"></script>
</body>
</html>
